<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#05070E" />
    <meta name="color-scheme" content="dark" />

    <!-- Primary SEO -->
    <title>BardNative — Real-Time Ad Yield for Modern Publishers</title>
    <meta
      name="description"
      content="BardNative is a Google-certified MCM partner that lifts publisher ad revenue with real-time yield optimization, header bidding, and fully transparent reporting on Google Ad Manager." />
    <meta
      name="keywords"
      content="BardNative, ad monetization, Google Ad Manager, MCM partner, AdX, header bidding, open bidding, publisher revenue, CPM optimization, programmatic advertising" />
    <meta name="author" content="BardNative" />
    <link rel="canonical" href="https://bardnative-website.vercel.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BardNative" />
    <meta property="og:title" content="BardNative — Real-Time Ad Yield for Modern Publishers" />
    <meta property="og:description" content="Google-certified MCM partner lifting publisher revenue with real-time yield optimization and fully transparent reporting." />
    <meta property="og:url" content="https://bardnative-website.vercel.app/" />
    <meta property="og:image" content="https://bardnative-website.vercel.app/logo.jpeg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BardNative — Real-Time Ad Yield for Modern Publishers" />
    <meta name="twitter:description" content="Google-certified MCM partner lifting publisher revenue with real-time yield optimization and fully transparent reporting." />
    <meta name="twitter:image" content="https://bardnative-website.vercel.app/logo.jpeg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet" />

    <!-- Prevent light flash before CSS loads -->
    <style>
      html, body { background-color: #05070E; }
    </style>

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "BardNative",
        "url": "https://bardnative-website.vercel.app/",
        "logo": "https://bardnative-website.vercel.app/logo.jpeg",
        "description": "Google-certified MCM partner providing real-time ad yield optimization and transparent reporting for publishers.",
        "sameAs": [],
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "adops@bardnative.com",
          "contactType": "sales"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
